<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LM-1 FSK Generator</title>
<style>
  body { font-family: Arial; max-width: 600px; margin: 40px auto; }
  label { display: block; margin-top: 10px; }
  button { margin-top: 20px; padding: 10px 20px; }
</style>
</head>
<body>

<h2>LM-1 FSK Generator</h2>

<label>BPM:
  <input type="number" id="bpm" value="120">
</label>

<label>Duration (seconds):
  <input type="number" id="duration" value="10">
</label>

<label>
  <input type="checkbox" id="leader"> Include 1 bar leader
</label>

<label>Leader Frequency:
  <select id="leaderFreq">
    <option value="low">LOW (1300 Hz)</option>
    <option value="high">HIGH (2100 Hz)</option>
  </select>
</label>

<button onclick="generate()">Generate & Download WAV</button>

<script>
function generate() {
    const bpm = parseFloat(document.getElementById('bpm').value);
    const duration = parseFloat(document.getElementById('duration').value);
    const leader = document.getElementById('leader').checked;
    const leaderFreq = document.getElementById('leaderFreq').value;

    const sampleRate = 44100;
    const fLow = 1300;
    const fHigh = 2100;
    const ppqn = 48;

    const pulsesPerSec = (bpm / 60) * ppqn;
    const symbolsPerSec = pulsesPerSec * 2;

    const samplesPerSymbol = Math.floor(sampleRate / symbolsPerSec);

    let leaderSamples = 0;
    if (leader) {
        const secondsPerBeat = 60 / bpm;
        leaderSamples = Math.floor(sampleRate * secondsPerBeat * 4);
    }

    const totalSamples = Math.floor(sampleRate * duration) + leaderSamples;
    const buffer = new Float32Array(totalSamples);

    let phase = 0;
    let t = 0;

    // --- Leader ---
    if (leader) {
        const freq = (leaderFreq === "high") ? fHigh : fLow;
        const inc = 2 * Math.PI * freq / sampleRate;

        for (let i = 0; i < leaderSamples; i++) {
            buffer[t++] = Math.sin(phase);
            phase += inc;
        }
    }

    // --- FSK ---
    let symbolIndex = 0;

    while (t < totalSamples) {
        const freq = (symbolIndex % 2 === 0) ? fHigh : fLow;
        const inc = 2 * Math.PI * freq / sampleRate;

        for (let i = 0; i < samplesPerSymbol && t < totalSamples; i++) {
            buffer[t++] = Math.sin(phase);
            phase += inc;
        }

        symbolIndex++;
    }

    // Normalize
    for (let i = 0; i < buffer.length; i++) {
        buffer[i] *= 0.8;
    }

    downloadWav(buffer, sampleRate);
}

function downloadWav(samples, sampleRate) {
    const buffer = new ArrayBuffer(44 + samples.length * 2);
    const view = new DataView(buffer);

    function writeString(offset, str) {
        for (let i = 0; i < str.length; i++) {
            view.setUint8(offset + i, str.charCodeAt(i));
        }
    }

    // WAV header
    writeString(0, 'RIFF');
    view.setUint32(4, 36 + samples.length * 2, true);
    writeString(8, 'WAVE');
    writeString(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    writeString(36, 'data');
    view.setUint32(40, samples.length * 2, true);

    // PCM data
    let offset = 44;
    for (let i = 0; i < samples.length; i++, offset += 2) {
        let s = Math.max(-1, Math.min(1, samples[i]));
        view.setInt16(offset, s * 32767, true);
    }

    const blob = new Blob([view], { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = 'lm1_fsk.wav';
    a.click();

    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
